# Price Sentinel example config.
# This file intentionally includes only fields read by the current CLI.

run:
  # Optional. If omitted, the CLI generates a timestamp-based run_id.
  run_id: null
  stale_lock_after_ms: 1800000

state:
  # Relative paths are resolved from the active config file location.
  dir: ".price-sentinel"
  alert_state_file: "alert-state.json"
  last_scan_file: "last-scan.json"
  lock_file: "scan.lock"

output:
  markdown_log: "/absolute/path/to/product-price-log.md"
  include_json: true

diagnostics:
  save_html: false
  artifact_dir: ".price-sentinel/diagnostics"

alerts:
  enabled: true
  notify_on:
    hits: true
    uncertain: false
    blocked: false
    errors: true
    scan_summary: false
  dedupe:
    enabled: true
    notify_when:
      - first_hit_for_check_source
      - price_drops
      - reentered_hit_state
    price_drop_threshold:
      amount: 1
  transports:
    - id: "personal-ntfy"
      type: ntfy
      enabled: true
      # Public ntfy topics should be treated like shared secrets. Use a long,
      # hard-to-guess topic name.
      topic: "replace-with-long-random-topic"
      server: "https://ntfy.sh"
      priority: default
      tags:
        - shopping_cart
        - price-tag
      title_template: "Product price hit: {{check.product_name}}"
      message_template: "{{source.retailer}} found {{price.currency}} {{price.amount}} for {{check.product_name}}."
      click: null
      token_env: null

checks:
  - id: "apple-macbook-air-15-m4-16-512"
    enabled: true
    product_name: "MacBook Air 15-inch M4 16GB 512GB"
    target:
      amount: 1799
      currency: CAD
    required:
      currency: CAD
      ships_to: CA
      condition:
        allow:
          - new
      seller:
        allow:
          - Apple
          - Apple Canada
      availability:
        allow:
          - in_stock
          - available
    attributes:
      category: laptop
      brand: Apple
      product_line: MacBook Air
      model: "15-inch"
      chip: M4
      memory_gb: 16
      storage_gb: 512
    sources:
      - id: "apple-ca-product-page"
        enabled: true
        retailer: apple_ca
        extractor: apple_ca_product_page
        url: "https://www.apple.com/ca/shop/buy-mac/macbook-air"
        expected_country: CA
        diagnostics:
          save_html: false

  - id: "generic-headphones-example"
    enabled: false
    product_name: "Example Wireless Headphones"
    target:
      amount: 249.99
      currency: CAD
    required:
      currency: CAD
      ships_to: CA
      condition:
        allow:
          - new
          - open_box
      seller:
        allow: []
      availability:
        allow:
          - in_stock
    attributes:
      brand: "Example Brand"
    sources:
      - id: "example-retailer-product-page"
        enabled: false
        retailer: example_retailer # display label only; never changes extraction behavior
        extractor: generic_product_page
        url: "https://example.com/product"
        expected_country: CA
        # Optional per-source extraction defaults (see README checks[].sources[] table):
        # price_unit: cents          # integer embedded-JSON prices are cents (÷100); default dollars
        # currency_default: USD      # currency when the page omits it; default CAD for .ca/CA sources
        # seller_default: "Example Retailer"  # observed seller when the page omits it (seller.allow matching)
        # availability_default: in_stock      # availability when the page omits it
