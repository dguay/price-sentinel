# Price Sentinel MacBook Canada starter.
# Copy created by `price-sentinel init-config --template macbook-canada`.
# Apple Canada is the first real source; add only sources you explicitly want scanned.

version: 1

project:
  name: "MacBook Canada Watch"
  description: "Starter active config for monitoring a MacBook from explicit Canadian sources."
  timezone: "America/Toronto"
  locale: "en-CA"

scheduling:
  # Informational only. Price Sentinel does not schedule itself.
  owner: external
  compatible_with:
    - codex_automation
    - cron
    - launchd

output:
  markdown_log: "macbook-price-log.md"
  include_json: false

alerts:
  enabled: false

checks:
  - id: "apple-macbook-air-m5"
    enabled: true
    product_name: "MacBook Air M5"
    target:
      amount: 1799
      currency: CAD
      comparison: at_or_below
    required:
      currency: CAD
      ships_to: CA
      condition:
        allow:
          - new
          - refurbished
      seller:
        allow:
          - Apple
          - Apple Canada
    attributes:
      category: laptop
      brand: Apple
      product_line: MacBook Air
      chip: M5
      model: null
      memory_gb: null
      storage_gb: null
      color: null
      part_number: null
    sources:
      - id: "apple-ca-product-page"
        enabled: true
        retailer: apple_ca
        extractor: apple_ca_product_page
        url: "https://www.apple.com/ca/shop/buy-mac/macbook-air"
        source_type: product_page
        expected_currency: CAD
        expected_country: CA
      - id: "apple-ca-refurbished-mac"
        enabled: true
        retailer: apple_ca
        extractor: apple_ca_product_page
        url: "https://www.apple.com/ca/shop/refurbished/mac"
        source_type: listing_page
        expected_currency: CAD
        expected_country: CA
