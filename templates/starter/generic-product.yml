# Price Sentinel generic product starter.
# Copy created by `price-sentinel init-config --template generic-product`.
# Edit the check, target, constraints, and source URL for the product you want.

output:
  markdown_log: "price-sentinel-log.md"
  include_json: false

alerts:
  enabled: false

checks:
  - id: "example-product"
    enabled: true
    product_name: "Example Product"
    target:
      amount: 100.00
      currency: CAD
    required:
      currency: CAD
      ships_to: CA
      condition:
        allow:
          - new
      availability:
        allow:
          - in_stock
          - available
    sources:
      - id: "example-retailer-product-page"
        enabled: true
        retailer: "example_retailer"
        extractor: generic_product_page
        url: "https://example.com/product"
        expected_country: CA
